{% extends "base.html" %}
{% block title %}Sign In – Phillies Roster{% endblock %}

{% block body %}
<div class="login-page">
  <div class="login-card">
    <div class="login-icon">⚾</div>
    <h1 class="login-title">Phillies Roster</h1>
    <p class="login-sub">Philadelphia Phillies · All-Time Players</p>

    <a class="btn-login" href="{{ url_for('auth_google') }}">Sign In with Google</a>

    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}
  </div>
</div>
{% endblock %}
